<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Dua.ai</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Google Sans', Arial, sans-serif;
      background: #fff;
      color: #202124;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    /* ── header ── */
    header {
      display: flex;
      justify-content: flex-end;
      align-items: center;
      padding: 16px 24px;
      gap: 12px;
    }
    header a {
      font-size: 13px;
      color: #202124;
      text-decoration: none;
    }
    header a:hover { text-decoration: underline; }

    /* ── hero ── */
    .hero {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 0 16px 120px;
    }

    .logo {
      font-size: 72px;
      font-weight: 700;
      letter-spacing: -3px;
      margin-bottom: 6px;
      line-height: 1;
    }
    .logo .D { color: #4285F4; }
    .logo .u { color: #EA4335; }
    .logo .a { color: #FBBC05; }
    .logo .dot { color: #4285F4; }
    .logo .ai { color: #34A853; }

    .tagline {
      font-size: 13px;
      color: #5f6368;
      margin-bottom: 32px;
      letter-spacing: 0.01em;
    }

    /* ── search bar ── */
    .search-wrap {
      width: 100%;
      max-width: 584px;
      margin-bottom: 20px;
    }

    .search-bar {
      display: flex;
      align-items: center;
      border: 1px solid #dfe1e5;
      border-radius: 24px;
      padding: 10px 16px;
      gap: 10px;
      background: #fff;
      transition: box-shadow 0.2s, border-color 0.2s;
    }
    .search-bar:focus-within {
      box-shadow: 0 1px 6px rgba(32,33,36,.28);
      border-color: transparent;
    }

    .search-bar svg { color: #9aa0a6; flex-shrink: 0; }

    .search-bar input {
      flex: 1;
      border: none;
      outline: none;
      font-size: 16px;
      color: #202124;
      background: transparent;
      font-family: inherit;
    }
    .search-bar input::placeholder { color: #9aa0a6; }

    .clear-btn {
      background: none;
      border: none;
      cursor: pointer;
      padding: 0;
      color: #9aa0a6;
      display: none;
      line-height: 0;
    }
    .clear-btn:hover { color: #5f6368; }

    /* ── buttons ── */
    .btn-row {
      display: flex;
      gap: 10px;
      justify-content: center;
    }

    .btn {
      padding: 9px 20px;
      border-radius: 4px;
      border: 1px solid #f8f9fa;
      background: #f8f9fa;
      font-size: 14px;
      color: #3c4043;
      cursor: pointer;
      font-family: inherit;
      transition: border-color 0.15s, box-shadow 0.15s;
    }
    .btn:hover {
      border-color: #dadce0;
      box-shadow: 0 1px 2px rgba(0,0,0,.1);
      color: #202124;
    }

    /* ── results area ── */
    .results {
      width: 100%;
      max-width: 584px;
      margin-top: 28px;
      display: none;
    }
    .results.visible { display: block; }

    .result-meta {
      font-size: 12px;
      color: #70757a;
      margin-bottom: 16px;
    }

    .result-card {
      border: 1px solid #dfe1e5;
      border-radius: 12px;
      padding: 20px 24px;
      background: #fff;
    }

    .result-source {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 10px;
    }
    .result-favicon {
      width: 20px;
      height: 20px;
      border-radius: 50%;
      background: linear-gradient(135deg, #EA4335, #FBBC05);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 10px;
      font-weight: 700;
      color: white;
      flex-shrink: 0;
    }
    .result-domain { font-size: 14px; color: #202124; }
    .result-subdomain { font-size: 12px; color: #70757a; }

    .result-title {
      font-size: 20px;
      color: #1a0dab;
      font-weight: 400;
      margin-bottom: 6px;
      line-height: 1.3;
    }

    .result-answer {
      font-size: 14px;
      color: #202124;
      line-height: 1.6;
    }

    .result-answer.pending {
      color: #70757a;
      font-style: italic;
    }

    .result-answer.pending::before {
      content: "⏳ ";
    }

    /* ── loading spinner ── */
    .spinner {
      display: none;
      width: 20px;
      height: 20px;
      border: 2px solid #f3f3f3;
      border-top: 2px solid #4285F4;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin: 24px auto 0;
    }
    .spinner.visible { display: block; }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── footer ── */
    footer {
      border-top: 1px solid #e8eaed;
      background: #f2f2f2;
      color: #70757a;
      font-size: 14px;
    }
    .footer-top { padding: 14px 24px; }
    .footer-bottom {
      border-top: 1px solid #e8eaed;
      padding: 12px 24px;
      display: flex;
      gap: 24px;
      flex-wrap: wrap;
    }
    footer a { color: #70757a; text-decoration: none; }
    footer a:hover { text-decoration: underline; }

    @media (max-width: 600px) {
      .logo { font-size: 52px; }
      .hero { padding-bottom: 60px; }
    }
  </style>
</head>
<body>

<header>
  <a href="#">About</a>
  <a href="#">How it works</a>
</header>

<main class="hero">
  <div class="logo">
    <span class="D">D</span><span class="u">u</span><span class="a">a</span><span class="dot">.</span><span class="ai">ai</span>
  </div>
  <p class="tagline">Ask Dua anything — she'll get back to you 💌</p>

  <div class="search-wrap">
    <div class="search-bar">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/>
      </svg>
      <input type="text" id="queryInput" placeholder="Ask Dua anything..." autocomplete="off" />
      <button class="clear-btn" id="clearBtn" aria-label="Clear">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/>
        </svg>
      </button>
    </div>
  </div>

  <div class="btn-row">
    <button class="btn" id="searchBtn">Dua Search</button>
    <button class="btn" id="luckyBtn">I'm Feeling Lucky</button>
  </div>

  <div class="spinner" id="spinner"></div>

  <div class="results" id="results">
    <p class="result-meta" id="resultMeta"></p>
    <div class="result-card">
      <div class="result-source">
        <div class="result-favicon">D</div>
        <div>
          <div class="result-domain">dua.ai</div>
          <div class="result-subdomain">dua.ai › answers</div>
        </div>
      </div>
      <div class="result-title" id="resultTitle"></div>
      <div class="result-answer" id="resultAnswer"></div>
    </div>
  </div>
</main>

<footer>
  <div class="footer-top">Pakistan</div>
  <div class="footer-bottom">
    <a href="#">How Dua.ai works</a>
    <a href="#">Privacy</a>
    <a href="#">Terms</a>
  </div>
</footer>

<script>
  // ── CONFIG ── replace these with your real URLs ──────────────────────────
  const FORM_SUBMIT_URL = "https://docs.google.com/forms/d/1t9tUbhAhbSp9iViM7qkki-AZ_axNFISQzHILtd6Gcwk/formResponse";
  const FORM_ENTRY_ID   = "entry.1630975485";
  const SHEET_CSV_URL   = "https://docs.google.com/spreadsheets/d/1nh7zs1taA07l6bennk1b9ikouNHUgduNIMRtqf0QsZ0/export?format=csv&gid=1297939200";
  // ─────────────────────────────────────────────────────────────────────────

  const input     = document.getElementById('queryInput');
  const clearBtn  = document.getElementById('clearBtn');
  const searchBtn = document.getElementById('searchBtn');
  const luckyBtn  = document.getElementById('luckyBtn');
  const spinner   = document.getElementById('spinner');
  const results   = document.getElementById('results');
  const resultMeta   = document.getElementById('resultMeta');
  const resultTitle  = document.getElementById('resultTitle');
  const resultAnswer = document.getElementById('resultAnswer');

  input.addEventListener('input', () => {
    clearBtn.style.display = input.value ? 'block' : 'none';
  });

  clearBtn.addEventListener('click', () => {
    input.value = '';
    clearBtn.style.display = 'none';
    results.classList.remove('visible');
    input.focus();
  });

  input.addEventListener('keydown', e => {
    if (e.key === 'Enter') doSearch();
  });

  searchBtn.addEventListener('click', doSearch);

  luckyBtn.addEventListener('click', () => {
    const fun = ["Do you love me?", "What's for dinner tonight?", "Am I your favourite person?", "What's the meaning of life?", "Will you always be my lucky charm?"];
    input.value = fun[Math.floor(Math.random() * fun.length)];
    clearBtn.style.display = 'block';
    doSearch();
  });

  async function doSearch() {
    const q = input.value.trim();
    if (!q) return;

    spinner.classList.add('visible');
    results.classList.remove('visible');

    // 1. Submit question to Google Form
    submitToForm(q);

    // 2. Check sheet for an existing answer
    const answer = await fetchAnswer(q);

    spinner.classList.remove('visible');

    resultTitle.textContent = q;
    resultMeta.textContent  = `About 1 result (from Dua's brain)`;

    if (answer) {
      resultAnswer.className = 'result-answer';
      resultAnswer.textContent = answer;
    } else {
      resultAnswer.className = 'result-answer pending';
      resultAnswer.textContent = "Dua has received your question and is thinking... check back soon!";
    }

    results.classList.add('visible');
  }

  function submitToForm(question) {
    // Submit via a hidden iframe so page doesn't reload
    const iframe = document.createElement('iframe');
    iframe.name = 'hidden_iframe';
    iframe.style.display = 'none';
    document.body.appendChild(iframe);

    const form = document.createElement('form');
    form.method = 'POST';
    form.action = FORM_SUBMIT_URL;
    form.target = 'hidden_iframe';

    const field = document.createElement('input');
    field.type  = 'hidden';
    field.name  = FORM_ENTRY_ID;
    field.value = question;
    form.appendChild(field);

    document.body.appendChild(form);
    form.submit();

    setTimeout(() => {
      document.body.removeChild(form);
      document.body.removeChild(iframe);
    }, 3000);
  }

  async function fetchAnswer(question) {
    try {
      const res  = await fetch(SHEET_CSV_URL);
      const text = await res.text();
      const rows = parseCSV(text);

      // rows: [timestamp, question, answer]
      const q = question.toLowerCase().trim();
      for (const row of rows.slice(1)) { // skip header
        if (row[1] && row[1].toLowerCase().trim() === q && row[2] && row[2].trim()) {
          return row[2].trim();
        }
      }
    } catch (e) {
      console.warn('Could not fetch sheet:', e);
    }
    return null;
  }

  function parseCSV(text) {
    return text.split('\n').map(line => {
      const cols = [];
      let cur = '', inQ = false;
      for (let i = 0; i < line.length; i++) {
        const c = line[i];
        if (c === '"') { inQ = !inQ; }
        else if (c === ',' && !inQ) { cols.push(cur); cur = ''; }
        else { cur += c; }
      }
      cols.push(cur);
      return cols;
    });
  }
</script>
</body>
</html>
