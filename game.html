<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Dua.ai — The Journey</title>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <style>
    @font-face {
      font-family: 'DuaHandwriting';
      src: url('DuacaddHandwriting-Regular.otf') format('opentype');
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Poppins', sans-serif;
      background: linear-gradient(135deg, #f5d6e8 0%, #e8d5f5 50%, #d4b8f0 100%);
      background-attachment: fixed;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      color: #3d2c4e;
    }

    nav {
      position: fixed;
      top: 0; left: 0; right: 0;
      display: flex; justify-content: space-between; align-items: center;
      padding: 14px 24px;
      background: rgba(255,255,255,0.35);
      backdrop-filter: blur(12px);
      border-bottom: 1px solid rgba(255,255,255,0.5);
      z-index: 100;
    }
    .nav-logo {
      font-family: 'Poppins', sans-serif;
      font-size: 22px; font-weight: 700;
      letter-spacing: -0.5px; cursor: pointer;
      text-decoration: none;
    }
    .nav-logo .l1 { color: #b06ab3; }
    .nav-logo .l2 { color: #c47fc9; }
    .nav-logo .l3 { color: #9b5de5; }
    .nav-logo .l4 { color: #b06ab3; }
    .nav-logo .l5 { color: #c47fc9; }
    .nav-logo .l6 { color: #9b5de5; }

    .back-btn {
      padding: 8px 16px; border-radius: 20px; font-size: 14px;
      cursor: pointer; border: none; background: rgba(255,255,255,0.6);
      color: #7a5c9a; font-family: 'Poppins', sans-serif; font-weight: 500;
      text-decoration: none;
    }

    .game-wrapper {
      margin-top: 80px;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 20px 16px 40px;
      width: 100%;
      max-width: 700px;
    }

    .game-title {
      font-size: 22px; font-weight: 600; color: #7c3aed;
      margin-bottom: 4px; text-align: center;
    }
    .game-subtitle {
      font-size: 13px; color: #9b7bb5; margin-bottom: 20px; text-align: center;
    }

    .game-container {
      background: rgba(255,255,255,0.6);
      backdrop-filter: blur(12px);
      border: 1.5px solid rgba(255,255,255,0.8);
      border-radius: 24px;
      padding: 20px;
      width: 100%;
    }

    .hud {
      display: flex; justify-content: space-between; align-items: center;
      margin-bottom: 12px; font-size: 14px; font-weight: 500; color: #7a5c9a;
    }
    .hud-score { font-size: 16px; color: #7c3aed; font-weight: 600; }

    canvas {
      width: 100%;
      border-radius: 16px;
      display: block;
      background: linear-gradient(180deg, #f0e6fa 0%, #e8d5f5 60%, #d4c5e8 100%);
      cursor: pointer;
    }

    .instructions {
      text-align: center; margin-top: 14px;
      font-size: 13px; color: #9b7bb5;
    }
    .instructions strong { color: #7c3aed; }

    .overlay {
      display: none;
      position: absolute; top: 0; left: 0; right: 0; bottom: 0;
      background: rgba(255,255,255,0.85);
      border-radius: 16px;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 20px;
    }
    .overlay.show { display: flex; }
    .overlay-title {
      font-size: 28px; font-weight: 700; color: #7c3aed; margin-bottom: 8px;
    }
    .overlay-msg {
      font-family: 'DuaHandwriting', cursive;
      font-size: 22px; color: #3d2c4e;
      line-height: 1.7; margin-bottom: 24px; max-width: 320px;
    }
    .play-btn {
      padding: 12px 32px; border-radius: 30px;
      background: linear-gradient(135deg, #b06ab3, #9b5de5);
      color: white; font-size: 16px; font-weight: 600;
      border: none; cursor: pointer; font-family: 'Poppins', sans-serif;
    }
    .canvas-wrap { position: relative; }

    .progress-bar-wrap {
      height: 6px; background: rgba(176,106,179,0.2);
      border-radius: 3px; margin-bottom: 12px; overflow: hidden;
    }
    .progress-bar {
      height: 100%; background: linear-gradient(90deg, #b06ab3, #9b5de5);
      border-radius: 3px; transition: width 0.3s;
      width: 0%;
    }
  </style>
</head>
<body>

<nav>
  <a class="nav-logo" href="index.html">
    <span class="l1">D</span><span class="l2">u</span><span class="l3">a</span><span class="l4">.</span><span class="l5">a</span><span class="l6">i</span>
  </a>
  <a class="back-btn" href="index.html">← Back</a>
</nav>

<div class="game-wrapper">
  <div class="game-title">The Journey 💜</div>
  <div class="game-subtitle">Help him reach her — jump over every obstacle!</div>

  <div class="game-container">
    <div class="hud">
      <span>Score: <span class="hud-score" id="scoreDisplay">0</span></span>
      <span id="progressLabel">Getting started...</span>
    </div>
    <div class="progress-bar-wrap">
      <div class="progress-bar" id="progressBar"></div>
    </div>
    <div class="canvas-wrap">
      <canvas id="gameCanvas" height="200"></canvas>
      <div class="overlay show" id="overlay">
        <div class="overlay-title">The Journey 💜</div>
        <div class="overlay-msg">Help him run through every obstacle to reach his girl!</div>
        <button class="play-btn" onclick="startGame()">Start Running 💨</button>
      </div>
    </div>
    <div class="instructions">
      <strong>Space / Tap</strong> to jump &nbsp;·&nbsp; <strong>Double tap</strong> to double jump
    </div>
  </div>
</div>

<script>
const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');
const overlay = document.getElementById('overlay');
const scoreDisplay = document.getElementById('scoreDisplay');
const progressBar = document.getElementById('progressBar');
const progressLabel = document.getElementById('progressLabel');

const W = canvas.width  = canvas.offsetWidth;
const H = canvas.height = 200;

const GROUND = H - 40;
const GRAVITY = 0.55;
const JUMP_FORCE = -12;
const TOTAL_OBSTACLES = 10;

let state = 'idle';
let score = 0;
let obstaclesCleared = 0;
let frame = 0;
let gameSpeed = 4;
let animId;

// ── BOY (stick figure style) ──
const boy = {
  x: 80, y: GROUND, w: 20, h: 36,
  vy: 0, onGround: true, jumpsLeft: 2,
  legFrame: 0
};

function resetBoy() {
  boy.y = GROUND; boy.vy = 0; boy.onGround = true; boy.jumpsLeft = 2; boy.legFrame = 0;
}

// ── OBSTACLES ──
let obstacles = [];
let nextObstacleIn = 80;

// ── GIRL (at finish line) ──
const FINISH_X_START = W + 500;
let girlX = FINISH_X_START;
let girlVisible = false;
let gameWon = false;

// ── CLOUDS ──
let clouds = [
  {x: 100, y: 30, r: 18},
  {x: 300, y: 20, r: 14},
  {x: 500, y: 35, r: 20},
];

// ── HEARTS (win animation) ──
let hearts = [];

function spawnHeart() {
  hearts.push({
    x: boy.x + Math.random() * 60 - 30,
    y: GROUND - 60,
    vy: -(Math.random() * 2 + 1),
    alpha: 1,
    size: Math.random() * 10 + 8
  });
}

function jump() {
  if (boy.jumpsLeft > 0) {
    boy.vy = JUMP_FORCE;
    boy.onGround = false;
    boy.jumpsLeft--;
  }
}

function spawnObstacle() {
  const types = ['rock', 'bush', 'tall'];
  const t = types[Math.floor(Math.random() * types.length)];
  const h = t === 'tall' ? 50 : t === 'bush' ? 28 : 22;
  const w = t === 'tall' ? 18 : t === 'bush' ? 32 : 20;
  obstacles.push({ x: W + 20, w, h, type: t });
}

function drawBoy(x, y, legF, alpha) {
  ctx.save();
  ctx.globalAlpha = alpha || 1;
  const bodyTop = y - boy.h;
  const headR = 9;
  const headCy = bodyTop + headR;
  const neckY = bodyTop + headR * 2;
  const hipY = neckY + 20;

  // head
  ctx.fillStyle = '#f5c5a3';
  ctx.beginPath();
  ctx.arc(x + boy.w/2, headCy, headR, 0, Math.PI * 2);
  ctx.fill();

  // hair
  ctx.fillStyle = '#3d2c4e';
  ctx.beginPath();
  ctx.ellipse(x + boy.w/2, headCy - 5, headR, headR * 0.5, 0, Math.PI, 0);
  ctx.fill();

  // body
  ctx.strokeStyle = '#3d2c4e';
  ctx.lineWidth = 3;
  ctx.lineCap = 'round';
  ctx.beginPath();
  ctx.moveTo(x + boy.w/2, neckY);
  ctx.lineTo(x + boy.w/2, hipY);
  ctx.stroke();

  // shirt
  ctx.strokeStyle = '#9b5de5';
  ctx.lineWidth = 5;
  ctx.beginPath();
  ctx.moveTo(x + boy.w/2, neckY + 2);
  ctx.lineTo(x + boy.w/2, neckY + 13);
  ctx.stroke();

  // arms
  ctx.strokeStyle = '#3d2c4e';
  ctx.lineWidth = 2.5;
  const armSwing = Math.sin(legF * 0.3) * 12;
  ctx.beginPath();
  ctx.moveTo(x + boy.w/2, neckY + 5);
  ctx.lineTo(x + boy.w/2 - 10, neckY + 5 + armSwing);
  ctx.stroke();
  ctx.beginPath();
  ctx.moveTo(x + boy.w/2, neckY + 5);
  ctx.lineTo(x + boy.w/2 + 10, neckY + 5 - armSwing);
  ctx.stroke();

  // legs
  const leg1 = Math.sin(legF * 0.3) * 14;
  const leg2 = Math.sin(legF * 0.3 + Math.PI) * 14;
  ctx.lineWidth = 3;
  ctx.strokeStyle = '#3d2c4e';
  ctx.beginPath();
  ctx.moveTo(x + boy.w/2, hipY);
  ctx.lineTo(x + boy.w/2 - 5 + leg1, y);
  ctx.stroke();
  ctx.beginPath();
  ctx.moveTo(x + boy.w/2, hipY);
  ctx.lineTo(x + boy.w/2 + 5 + leg2, y);
  ctx.stroke();

  // eyes
  ctx.fillStyle = '#3d2c4e';
  ctx.beginPath(); ctx.arc(x + boy.w/2 + 4, headCy + 1, 1.5, 0, Math.PI * 2); ctx.fill();

  ctx.restore();
}

function drawGirl(x, y) {
  ctx.save();
  const bodyTop = y - 36;
  const headR = 9;
  const headCy = bodyTop + headR;
  const neckY = bodyTop + headR * 2;
  const hipY = neckY + 18;

  // dress / skirt
  ctx.fillStyle = '#c47fc9';
  ctx.beginPath();
  ctx.moveTo(x + 10, hipY);
  ctx.lineTo(x, y + 2);
  ctx.lineTo(x + 20, y + 2);
  ctx.closePath();
  ctx.fill();

  // body
  ctx.fillStyle = '#c47fc9';
  ctx.fillRect(x + 4, neckY, 12, 18);

  // head
  ctx.fillStyle = '#f5c5a3';
  ctx.beginPath();
  ctx.arc(x + 10, headCy, headR, 0, Math.PI * 2);
  ctx.fill();

  // hair (long)
  ctx.fillStyle = '#3d2c4e';
  ctx.beginPath();
  ctx.ellipse(x + 10, headCy - 4, headR, headR * 0.55, 0, Math.PI, 0);
  ctx.fill();
  ctx.fillRect(x + 1, headCy, 4, 14);
  ctx.fillRect(x + 15, headCy, 4, 14);

  // heart above
  ctx.fillStyle = '#b06ab3';
  ctx.font = '14px serif';
  ctx.fillText('💜', x + 2, bodyTop - 4);

  // eyes
  ctx.fillStyle = '#3d2c4e';
  ctx.beginPath(); ctx.arc(x + 7, headCy + 1, 1.5, 0, Math.PI * 2); ctx.fill();

  // smile
  ctx.strokeStyle = '#3d2c4e';
  ctx.lineWidth = 1.5;
  ctx.beginPath();
  ctx.arc(x + 10, headCy + 3, 4, 0.2, Math.PI - 0.2);
  ctx.stroke();

  ctx.restore();
}

function drawObstacle(obs) {
  ctx.save();
  if (obs.type === 'rock') {
    ctx.fillStyle = '#9b7bb5';
    ctx.beginPath();
    ctx.ellipse(obs.x + obs.w/2, GROUND - obs.h/2, obs.w/2, obs.h/2, 0, 0, Math.PI * 2);
    ctx.fill();
    ctx.fillStyle = '#c4a8d8';
    ctx.beginPath();
    ctx.ellipse(obs.x + obs.w/2 - 3, GROUND - obs.h/2 - 3, obs.w/4, obs.h/4, -0.5, 0, Math.PI * 2);
    ctx.fill();
  } else if (obs.type === 'bush') {
    ctx.fillStyle = '#b06ab3';
    ctx.beginPath();
    ctx.arc(obs.x + obs.w/2, GROUND - obs.h + 10, obs.w/2, 0, Math.PI * 2);
    ctx.fill();
    ctx.fillStyle = '#c47fc9';
    ctx.beginPath();
    ctx.arc(obs.x + 8, GROUND - obs.h + 8, 10, 0, Math.PI * 2);
    ctx.fill();
    ctx.beginPath();
    ctx.arc(obs.x + obs.w - 8, GROUND - obs.h + 8, 10, 0, Math.PI * 2);
    ctx.fill();
  } else {
    ctx.fillStyle = '#9b5de5';
    ctx.fillRect(obs.x, GROUND - obs.h, obs.w, obs.h);
    ctx.fillStyle = '#c47fc9';
    ctx.fillRect(obs.x + 4, GROUND - obs.h + 4, obs.w - 8, obs.h / 3);
  }
  ctx.restore();
}

function drawCloud(c) {
  ctx.save();
  ctx.fillStyle = 'rgba(255,255,255,0.55)';
  ctx.beginPath();
  ctx.arc(c.x, c.y, c.r, 0, Math.PI * 2); ctx.fill();
  ctx.beginPath();
  ctx.arc(c.x + c.r, c.y + 4, c.r * 0.7, 0, Math.PI * 2); ctx.fill();
  ctx.beginPath();
  ctx.arc(c.x - c.r, c.y + 4, c.r * 0.7, 0, Math.PI * 2); ctx.fill();
  ctx.restore();
}

function drawGround() {
  ctx.fillStyle = '#d4b8f0';
  ctx.fillRect(0, GROUND, W, H - GROUND);
  ctx.fillStyle = '#c4a8d8';
  ctx.fillRect(0, GROUND, W, 3);
  // flowers
  for (let i = 0; i < W; i += 40) {
    const fi = (i + frame * gameSpeed * 0.5) % W;
    ctx.fillStyle = '#f5d6e8';
    ctx.beginPath();
    ctx.arc(fi, GROUND + 6, 3, 0, Math.PI * 2);
    ctx.fill();
  }
}

function drawHeart(hx, hy, size) {
  ctx.save();
  ctx.fillStyle = '#b06ab3';
  ctx.font = `${size}px serif`;
  ctx.fillText('💜', hx, hy);
  ctx.restore();
}

function checkCollision() {
  for (const obs of obstacles) {
    const bLeft = boy.x + 4;
    const bRight = boy.x + boy.w - 4;
    const bTop = boy.y - boy.h + 5;
    const bBottom = boy.y;
    const oLeft = obs.x;
    const oRight = obs.x + obs.w;
    const oTop = GROUND - obs.h;
    if (bRight > oLeft && bLeft < oRight && bBottom > oTop && bTop < GROUND) {
      return true;
    }
  }
  return false;
}

function loop() {
  ctx.clearRect(0, 0, W, H);

  // background
  ctx.fillStyle = 'rgba(240,230,250,0.3)';
  ctx.fillRect(0, 0, W, H);

  // clouds
  clouds.forEach(c => {
    c.x -= 0.4;
    if (c.x < -40) c.x = W + 40;
    drawCloud(c);
  });

  drawGround();

  if (!gameWon) {
    // physics
    boy.vy += GRAVITY;
    boy.y += boy.vy;
    if (boy.y >= GROUND) {
      boy.y = GROUND;
      boy.vy = 0;
      boy.onGround = true;
      boy.jumpsLeft = 2;
    } else {
      boy.onGround = false;
    }

    if (boy.onGround) boy.legFrame += gameSpeed;

    // obstacles
    nextObstacleIn--;
    if (nextObstacleIn <= 0 && obstaclesCleared < TOTAL_OBSTACLES) {
      spawnObstacle();
      nextObstacleIn = Math.floor(Math.random() * 40 + 70);
    }

    obstacles = obstacles.filter(o => o.x + o.w > 0);
    obstacles.forEach(o => {
      o.x -= gameSpeed;
      if (o.x + o.w < boy.x && !o.counted) {
        o.counted = true;
        obstaclesCleared++;
        score += 10;
        scoreDisplay.textContent = score;
        gameSpeed = 4 + obstaclesCleared * 0.2;
        const pct = (obstaclesCleared / TOTAL_OBSTACLES) * 100;
        progressBar.style.width = pct + '%';
        const msgs = ['Just started...', 'Keep going! 💨', 'Halfway there! 🌸', 'Almost there! 💜', 'She can see you! 🥹'];
        progressLabel.textContent = msgs[Math.min(Math.floor(obstaclesCleared / 2), msgs.length - 1)];
      }
      drawObstacle(o);
    });

    // show girl when all obstacles done
    if (obstaclesCleared >= TOTAL_OBSTACLES && obstacles.length === 0) {
      if (!girlVisible) { girlVisible = true; }
    }

    if (girlVisible) {
      girlX -= gameSpeed;
      drawGirl(girlX, GROUND);

      // win condition: boy reaches girl
      if (girlX < boy.x + 40) {
        gameWon = true;
        progressBar.style.width = '100%';
        progressLabel.textContent = 'He made it! 💜';
      }
    }

    drawBoy(boy.x, boy.y, boy.legFrame, 1);

    if (checkCollision()) {
      endGame(false);
      return;
    }

  } else {
    // WIN state animation
    drawGirl(boy.x + 30, GROUND);
    drawBoy(boy.x, GROUND, frame * 2, 1);

    if (frame % 8 === 0) spawnHeart();

    hearts = hearts.filter(h => h.alpha > 0);
    hearts.forEach(h => {
      h.y += h.vy;
      h.alpha -= 0.012;
      ctx.save();
      ctx.globalAlpha = h.alpha;
      ctx.font = `${h.size}px serif`;
      ctx.fillText('💜', h.x, h.y);
      ctx.restore();
    });

    if (frame === 80) {
      endGame(true);
      return;
    }
  }

  frame++;
  animId = requestAnimationFrame(loop);
}

function endGame(won) {
  cancelAnimationFrame(animId);
  overlay.classList.add('show');
  overlay.innerHTML = won ? `
    <div class="overlay-title">He made it! 🥹💜</div>
    <div class="overlay-msg">Just like in real life — he always finds his way to her.</div>
    <button class="play-btn" onclick="startGame()">Play again 💜</button>
  ` : `
    <div class="overlay-title">Oops! Try again 💨</div>
    <div class="overlay-msg">Every love story has obstacles. Keep running!</div>
    <button class="play-btn" onclick="startGame()">Try again</button>
  `;
}

function startGame() {
  cancelAnimationFrame(animId);
  overlay.classList.remove('show');
  obstacles = [];
  obstaclesCleared = 0;
  score = 0;
  frame = 0;
  gameSpeed = 4;
  gameWon = false;
  girlVisible = false;
  girlX = FINISH_X_START;
  nextObstacleIn = 90;
  hearts = [];
  scoreDisplay.textContent = '0';
  progressBar.style.width = '0%';
  progressLabel.textContent = 'Getting started...';
  resetBoy();
  loop();
}

// controls
document.addEventListener('keydown', e => {
  if (e.code === 'Space') { e.preventDefault(); if (state !== 'idle') jump(); }
});
canvas.addEventListener('click', () => { if (state !== 'idle') jump(); });
canvas.addEventListener('touchstart', e => { e.preventDefault(); if (state !== 'idle') jump(); }, { passive: false });

// start the idle animation
state = 'playing';
</script>
</body>
</html>
