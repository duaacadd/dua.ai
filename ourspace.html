<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Dua.ai — Our Space</title>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <style>
    @font-face { font-family:'DuaHandwriting'; src:url('DuacaddHandwriting-Regular.otf') format('opentype'); }
    *{box-sizing:border-box;margin:0;padding:0;}
    html,body{height:100%;}
    body{font-family:'Poppins',sans-serif;background:#0f0a1a;color:#efe6f5;overflow:hidden;}

    /* top nav */
    nav{position:fixed;top:0;left:0;right:0;display:flex;justify-content:space-between;align-items:center;
        padding:12px 22px;z-index:60;}
    .nav-logo{font-family:'Poppins',sans-serif;font-size:20px;font-weight:700;letter-spacing:-0.5px;text-decoration:none;opacity:.9;}
    .nav-logo .l1{color:#b06ab3;}.nav-logo .l2{color:#c47fc9;}.nav-logo .l3{color:#9b5de5;}.nav-logo .l4{color:#b06ab3;}.nav-logo .l5{color:#c47fc9;}.nav-logo .l6{color:#9b5de5;}
    .back-btn{padding:7px 15px;border-radius:20px;font-size:13px;cursor:pointer;border:1px solid rgba(255,255,255,.25);
        background:rgba(255,255,255,.1);color:#e7dcf0;font-family:'Poppins',sans-serif;font-weight:500;text-decoration:none;backdrop-filter:blur(6px);}

    /* stage holds the scaled scene */
    #room{position:fixed;inset:0;display:flex;align-items:center;justify-content:center;
      background:radial-gradient(120% 90% at 50% 40%, #1a1230 0%, #0d0818 100%);}
    .stage{position:relative;width:min(100vw, calc(100vh * 1000/660));aspect-ratio:1000/660;}
    .scene{position:absolute;inset:0;width:100%;height:100%;transition:filter 1s ease;filter:brightness(.34) saturate(.5);}
    #room.on .scene{filter:brightness(1) saturate(1);}

    /* darkness veil + warm glow (inside svg) transition via css */
    #darkness{transition:opacity 1s ease;opacity:.9;}
    #room.on #darkness{opacity:0;}
    #glow{transition:opacity 1.1s ease;opacity:0;}
    #room.on #glow{opacity:.6;}
    .fairy{fill:#5b4a30;transition:fill 1s ease, filter 1s ease;}
    #room.on .fairy{fill:#ffd98a;filter:drop-shadow(0 0 5px #ffcf7a);}

    /* html UI over the scene — hidden until lights on */
    .room-ui{position:absolute;inset:0;pointer-events:none;opacity:0;transition:opacity 1s ease;}
    #room.on .room-ui{opacity:1;}
    #room.on .room-ui .clickable{pointer-events:auto;}

    /* title */
    .space-title{position:absolute;top:5.5%;left:50%;transform:translateX(-50%);text-align:center;}
    .space-title h1{font-size:clamp(20px,3.4vw,34px);font-weight:700;color:#ffe6c2;letter-spacing:.06em;text-shadow:0 2px 14px rgba(255,190,120,.4);}
    .space-title p{font-family:'DuaHandwriting',cursive;font-size:clamp(14px,2vw,20px);color:#ffd6a8;margin-top:2px;}

    /* timer panel */
    .timer{position:absolute;left:6%;top:30%;width:22%;min-width:150px;text-align:center;
      background:rgba(38,24,54,.72);border:2px solid #caa24e;border-radius:16px;padding:14px 12px;
      box-shadow:0 6px 22px rgba(0,0,0,.4), inset 0 0 20px rgba(255,205,120,.12);backdrop-filter:blur(3px);}
    .timer .label{font-size:11px;letter-spacing:.12em;text-transform:uppercase;color:#e9c99a;margin-bottom:4px;}
    .timer .days{font-size:clamp(26px,3.6vw,40px);font-weight:700;color:#ffe6c2;line-height:1;}
    .timer .days span{font-size:.42em;font-weight:500;color:#e9c99a;}
    .timer .sub{font-family:'DuaHandwriting',cursive;font-size:16px;color:#ffd0e0;margin-top:6px;}
    .timer .date{font-size:10px;color:#c9a9d8;margin-top:3px;}

    /* spotify player panel (slides up from the sax) */
    .player{position:absolute;left:3%;bottom:6%;width:34%;min-width:260px;
      background:rgba(24,16,36,.92);border:1px solid rgba(255,255,255,.18);border-radius:16px;padding:12px;
      box-shadow:0 10px 30px rgba(0,0,0,.5);transform:translateY(18px) scale(.98);opacity:0;pointer-events:none;
      transition:opacity .3s ease, transform .3s ease;}
    .player.show{opacity:1;transform:translateY(0) scale(1);pointer-events:auto;}
    .player .phead{display:flex;justify-content:space-between;align-items:center;margin-bottom:8px;}
    .player .phead b{font-size:13px;color:#e7dcf0;font-weight:600;}
    .player .pclose{cursor:pointer;color:#c9a9d8;font-size:16px;line-height:1;background:none;border:none;}
    .player iframe{width:100%;border:0;border-radius:12px;display:block;}
    .player .note{font-size:11px;color:#b79ad6;margin-top:6px;text-align:center;}

    /* light switch (always visible) */
    .light-switch{position:absolute;top:24%;right:5%;width:52px;height:82px;border-radius:11px;z-index:40;cursor:pointer;
      background:linear-gradient(#efe6d0,#d7cbac);border:2px solid #b3a482;box-shadow:0 5px 12px rgba(0,0,0,.45);}
    .switch-knob{position:absolute;left:50%;transform:translateX(-50%);top:8px;width:26px;height:32px;border-radius:6px;
      background:#c7bd9e;box-shadow:inset 0 -3px 4px rgba(0,0,0,.15);transition:top .18s ease, background .18s ease;}
    #room.on .switch-knob{top:42px;background:#ffd07a;}
    .switch-led{position:absolute;left:50%;transform:translateX(-50%);bottom:6px;width:7px;height:7px;border-radius:50%;
      background:#8a7a55;transition:background .3s, box-shadow .3s;}
    #room.on .switch-led{background:#7CFF9B;box-shadow:0 0 8px #7CFF9B;}
    #room:not(.on) .light-switch{animation:switchpulse 2.2s ease-in-out infinite;}
    @keyframes switchpulse{0%,100%{box-shadow:0 5px 12px rgba(0,0,0,.45), 0 0 10px 2px rgba(255,220,150,.25);}
      50%{box-shadow:0 5px 12px rgba(0,0,0,.45), 0 0 26px 8px rgba(255,220,150,.55);}}
    .switch-hint{position:absolute;top:38%;right:4%;z-index:40;color:#ffe6b8;font-family:'DuaHandwriting',cursive;font-size:20px;
      text-align:center;width:120px;transition:opacity .6s;pointer-events:none;text-shadow:0 2px 10px rgba(0,0,0,.6);}
    #room.on .switch-hint{opacity:0;}

    /* steam + music-note animations */
    .steam{opacity:0;animation:steam 3.4s ease-in-out infinite;transform-origin:center;}
    .steam.s2{animation-delay:1.1s;}.steam.s3{animation-delay:2.2s;}
    @keyframes steam{0%{opacity:0;transform:translateY(0) scaleX(1);}
      25%{opacity:.5;}60%{opacity:.35;}100%{opacity:0;transform:translateY(-26px) scaleX(1.5);}}
    #room:not(.on) .steam{animation-play-state:paused;}
    .music-note{position:absolute;font-size:22px;color:#ffd98a;pointer-events:none;
      animation:floatnote 1.8s ease-out forwards;text-shadow:0 2px 8px rgba(0,0,0,.5);}
    @keyframes floatnote{0%{opacity:0;transform:translate(0,0) rotate(-8deg) scale(.6);}
      20%{opacity:1;}100%{opacity:0;transform:translate(var(--dx),-90px) rotate(12deg) scale(1.1);}}
    .sax-hot{cursor:pointer;}
    #room.on #saxGroup{cursor:pointer;}
  </style>
</head>

      </g>

      <!-- warm glow + darkness veil (toggled by the switch) -->
      <rect id="glow" x="0" y="0" width="1000" height="660" fill="url(#glowG)" style="mix-blend-mode:screen"/>
      <rect id="darkness" x="0" y="0" width="1000" height="660" fill="#0b0716"/>
    </svg>

    <!-- ─────────── HTML UI OVER SCENE ─────────── -->
    <div class="switch-hint" id="switchHint">flip the switch</div>
    <div class="light-switch clickable" id="lightSwitch" title="Switch the lights">
      <div class="switch-knob"></div><div class="switch-led"></div>
    </div>

    <div class="room-ui">
      <div class="space-title"><h1>OUR SPACE</h1><p>just for us 💜</p></div>

      <div class="timer">
        <div class="label">Time since our first date</div>
        <div class="days" id="daysCount">—</div>
        <div class="sub" id="togetherSub"></div>
        <div class="date">since 4 July 2025</div>
      </div>

      <div class="player" id="player">
        <div class="phead"><b>🎷 Our playlist</b><button class="pclose" id="pclose" aria-label="close">✕</button></div>
        <iframe id="spotifyFrame" title="Spotify player" loading="lazy" allow="encrypted-media" height="152"></iframe>
        <div class="note">our little playlist 💜</div>
      </div>
    </div>
  </div>
</div>

<script>
  const room = document.getElementById('room');
  const sw = document.getElementById('lightSwitch');

  // ── lights ──
  function toggleLights(){ room.classList.toggle('on'); }
  sw.addEventListener('click', toggleLights);

  // ── timer since first date ──
  const FIRST_DATE = new Date(2025, 6, 4, 0, 0, 0); // 4 July 2025 (month is 0-indexed)
  function updateTimer(){
    const now = new Date();
    const ms = now - FIRST_DATE;
    const days = Math.floor(ms/86400000);
    document.getElementById('daysCount').innerHTML = days + ' <span>days</span>';
    // rough years / months / days breakdown
    let y = now.getFullYear()-FIRST_DATE.getFullYear();
    let mo = now.getMonth()-FIRST_DATE.getMonth();
    let d = now.getDate()-FIRST_DATE.getDate();
    if(d<0){ mo--; d += new Date(now.getFullYear(), now.getMonth(), 0).getDate(); }
    if(mo<0){ y--; mo += 12; }
    const parts=[]; if(y)parts.push(y+(y>1?' years':' year')); if(mo)parts.push(mo+(mo>1?' months':' month')); parts.push(d+(d!==1?' days':' day'));
    document.getElementById('togetherSub').textContent = 'together '+parts.join(', ');
  }
  updateTimer(); setInterval(updateTimer, 60000);

  // ── saxophone → music notes + spotify player ──
  // 'Our Space' Spotify playlist
  const PLAYLIST_ID = '3zwdfvPr50nMfvgTI8DZmH';
  const player = document.getElementById('player');
  const frame = document.getElementById('spotifyFrame');
  const sax = document.getElementById('saxGroup');
  const stage = document.getElementById('stage');
  let loaded = false;
  function openPlayer(){
    if(!room.classList.contains('on')) toggleLights();  // clicking the sax also wakes the room
    if(!loaded){ frame.src = 'https://open.spotify.com/embed/playlist/'+PLAYLIST_ID+'?utm_source=generator&theme=0'; loaded = true; }
    player.classList.add('show');
  }
  sax.addEventListener('click', e=>{ spawnNotes(); openPlayer(); });
  document.getElementById('pclose').addEventListener('click', ()=>player.classList.remove('show'));

  function spawnNotes(){
    const glyphs=['♪','♫','♬','🎵'];
    const r = sax.getBoundingClientRect(), sr = stage.getBoundingClientRect();
    for(let i=0;i<6;i++){
      const n=document.createElement('div'); n.className='music-note'; n.textContent=glyphs[i%glyphs.length];
      n.style.left=(r.left - sr.left + 20 + Math.random()*20)+'px';
      n.style.top =(r.top  - sr.top  + 10 + Math.random()*20)+'px';
      n.style.setProperty('--dx', (Math.random()*70-20)+'px');
      n.style.animationDelay=(i*0.12)+'s';
      stage.appendChild(n);
      setTimeout(()=>n.remove(), 2200);
    }
  }
</script>
</body>
</html>
