<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Dua.ai — Our Space</title>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <style>
    @font-face { font-family:'DuaHandwriting'; src:url('DuacaddHandwriting-Regular.otf') format('opentype'); }
    *{box-sizing:border-box;margin:0;padding:0;}
    body{font-family:'Poppins',sans-serif;background:linear-gradient(135deg,#f5d6e8 0%,#e8d5f5 50%,#d4b8f0 100%);background-attachment:fixed;min-height:100vh;display:flex;flex-direction:column;align-items:center;color:#3d2c4e;}
    nav{position:fixed;top:0;left:0;right:0;display:flex;justify-content:space-between;align-items:center;padding:14px 24px;background:rgba(255,255,255,0.35);backdrop-filter:blur(12px);border-bottom:1px solid rgba(255,255,255,0.5);z-index:100;}
    .nav-logo{font-family:'Poppins',sans-serif;font-size:22px;font-weight:700;letter-spacing:-0.5px;text-decoration:none;}
    .nav-logo .l1{color:#b06ab3;}.nav-logo .l2{color:#c47fc9;}.nav-logo .l3{color:#9b5de5;}.nav-logo .l4{color:#b06ab3;}.nav-logo .l5{color:#c47fc9;}.nav-logo .l6{color:#9b5de5;}
    .back-btn{padding:8px 16px;border-radius:20px;font-size:14px;cursor:pointer;border:none;background:rgba(255,255,255,0.6);color:#7a5c9a;font-family:'Poppins',sans-serif;font-weight:500;text-decoration:none;}
    .wrap{margin-top:110px;padding:0 20px 80px;width:100%;max-width:680px;display:flex;flex-direction:column;align-items:center;}
    .space-hearts{font-size:26px;letter-spacing:6px;margin-bottom:18px;}
    .space-title{font-size:30px;font-weight:700;color:#7c3aed;text-align:center;margin-bottom:6px;}
    .space-subtitle{font-family:'DuaHandwriting',cursive;font-size:22px;color:#9b5de5;text-align:center;margin-bottom:30px;line-height:1.6;}
    .space-card{background:rgba(255,255,255,0.55);backdrop-filter:blur(12px);border:1.5px solid rgba(255,255,255,0.8);border-radius:24px;padding:40px 34px;width:100%;text-align:center;}
    .space-card p{color:#7a5c9a;font-size:15px;line-height:1.7;}
  </style>
</head>
<body>
<nav>
  <a class="nav-logo" href="index.html"><span class="l1">D</span><span class="l2">u</span><span class="l3">a</span><span class="l4">.</span><span class="l5">a</span><span class="l6">i</span></a>
  <a class="back-btn" href="index.html">← Home</a>
</nav>
<div class="wrap">
  <div class="space-hearts">💜🌸💜</div>
  <div class="space-title">Our Space</div>
  <div class="space-subtitle">just for us 💜</div>
  <div class="space-card">
    <p>This little corner is ours. More to come here soon.</p>
  </div>
</div>
</body>
</html>
