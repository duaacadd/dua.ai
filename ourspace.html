<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Dua.ai — Our Space</title>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <style>
    @font-face { font-family:'DuaHandwriting'; src:url('DuacaddHandwriting-Regular.otf') format('opentype'); }
    *{box-sizing:border-box;margin:0;padding:0;}
    html,body{height:100%;}
    body{font-family:'Poppins',sans-serif;background:#0d0818;color:#efe6f5;overflow:hidden;}

    nav{position:fixed;top:0;left:0;right:0;display:flex;justify-content:space-between;align-items:center;padding:12px 22px;z-index:80;}
    .nav-logo{font-size:20px;font-weight:700;letter-spacing:-0.5px;text-decoration:none;opacity:.92;}
    .nav-logo .l1{color:#b06ab3;}.nav-logo .l2{color:#c47fc9;}.nav-logo .l3{color:#9b5de5;}.nav-logo .l4{color:#b06ab3;}.nav-logo .l5{color:#c47fc9;}.nav-logo .l6{color:#9b5de5;}
    .back-btn{padding:7px 15px;border-radius:20px;font-size:13px;cursor:pointer;border:1px solid rgba(255,255,255,.25);background:rgba(255,255,255,.12);color:#e7dcf0;font-family:'Poppins',sans-serif;font-weight:500;text-decoration:none;backdrop-filter:blur(6px);}

    #room{position:fixed;inset:0;display:flex;align-items:center;justify-content:center;background:#0d0818;
      /* ── positions (percent of the scene) — tweakable ── */
      --tmr-l:64.6%; --tmr-t:18.4%; --tmr-w:13.9%; --tmr-h:5.6%;
      --jp-l:67.4%;  --jp-t:31.5%;  --jp-w:10.9%; --jp-h:20.8%;
      --sw-l:3.6%;   --sw-t:12.5%;}
    .stage{position:relative;width:min(100vw, calc(100vh * 16/9));aspect-ratio:16/9;}
    /* dark wall + floor behind the illustration (shows through a transparent PNG) */
    .bg{position:absolute;inset:0;z-index:0;background:linear-gradient(180deg,#3a2b52 0%,#2f2246 48%,#271c3b 72%,#1c1430 72.2%,#140d22 100%);}
    .illus{position:absolute;inset:0;width:100%;height:100%;display:block;z-index:1;transition:filter 1.1s ease;}
    #room:not(.on) .illus{filter:brightness(.5) saturate(.85);}
    #room.on .illus{filter:saturate(1.08) brightness(1.03);}
    .overlay{position:absolute;inset:0;width:100%;height:100%;pointer-events:none;z-index:5;}

    /* lighting: veil dark until switched on; warm glow + fairy glow when on */
    .veil{position:absolute;inset:0;background:rgba(6,4,14,.93);transition:opacity 1.1s ease;opacity:1;pointer-events:none;z-index:20;}
    #room.on .veil{opacity:0;}
    .warm{position:absolute;inset:0;pointer-events:none;z-index:21;opacity:0;transition:opacity 1.2s ease;mix-blend-mode:soft-light;
      background:radial-gradient(44% 42% at 50% 30%, rgba(255,205,135,.6), rgba(255,175,115,.16) 55%, transparent 72%);}
    #room.on .warm{opacity:.55;}
    .fairy-wire{stroke:#8a7c66;stroke-width:2.5;fill:none;opacity:.4;}
    .fairy{fill:#ffd27a;transition:fill 1.1s ease;opacity:.5;}
    #room:not(.on) .fairy{fill:#5a4a2e;opacity:.4;filter:none;animation:none;}
    #room.on .fairy{filter:drop-shadow(0 0 4px #ffd27a) drop-shadow(0 0 9px rgba(255,170,80,.55));animation:twinkle 2.4s ease-in-out infinite;}
    @keyframes twinkle{0%,100%{opacity:.5;}50%{opacity:1;}}
    .fairy-spark{fill:#fff4d6;opacity:0;transform-box:fill-box;transform-origin:center;}
    #room.on .fairy-spark{animation:spark 3.2s ease-in-out infinite;}
    @keyframes spark{0%,68%,100%{opacity:0;transform:scale(.35);}10%{opacity:.95;transform:scale(1);}22%{opacity:0;transform:scale(.5);}}

    /* scene overlays fade in with the light */
    .room-ui{opacity:0;transition:opacity 1.1s ease;}
    #room.on .room-ui{opacity:1;}

    /* timer */
    .timer{position:absolute;left:var(--tmr-l);top:var(--tmr-t);width:var(--tmr-w);height:var(--tmr-h);
      display:flex;align-items:center;justify-content:space-around;gap:1.5%;z-index:30;pointer-events:none;
      background:linear-gradient(#4a2f6b,#392455);border:1px solid rgba(255,214,150,.35);border-radius:9px;
      box-shadow:inset 0 0 12px rgba(0,0,0,.35);}
    .tcell{text-align:center;line-height:1;}
    .tcell .n{font-weight:700;color:#ffe6c2;font-size:clamp(10px,1.35vw,21px);}
    .tcell .l{font-size:clamp(5px,.6vw,9px);letter-spacing:.05em;text-transform:uppercase;color:#d8b98f;margin-top:2px;}

    /* spotify player near the gramophone */
    .player{position:absolute;left:2.5%;bottom:5%;width:32%;min-width:250px;z-index:70;
      background:rgba(24,16,36,.94);border:1px solid rgba(255,255,255,.18);border-radius:16px;padding:12px;
      box-shadow:0 10px 30px rgba(0,0,0,.5);transform:translateY(16px) scale(.98);opacity:0;pointer-events:none;transition:.3s ease;}
    .player.show{opacity:1;transform:none;pointer-events:auto;}
    .player .phead{display:flex;justify-content:space-between;align-items:center;margin-bottom:8px;}
    .player .phead b{font-size:13px;color:#e7dcf0;}
    .player .pclose{cursor:pointer;color:#c9a9d8;font-size:16px;background:none;border:none;}
    .player iframe{width:100%;border:0;border-radius:12px;display:block;}
    .player .note{font-size:11px;color:#b79ad6;margin-top:6px;text-align:center;}

    /* light switch */
    .light-switch{position:absolute;left:var(--sw-l);top:var(--sw-t);width:46px;height:74px;border-radius:10px;z-index:75;cursor:pointer;
      background:linear-gradient(#efe6d0,#d7cbac);border:2px solid #b3a482;box-shadow:0 5px 12px rgba(0,0,0,.45);}
    .switch-knob{position:absolute;left:50%;transform:translateX(-50%);top:7px;width:24px;height:28px;border-radius:6px;background:#c7bd9e;transition:top .18s,background .18s;}
    #room.on .switch-knob{top:38px;background:#ffd07a;}
    .switch-led{position:absolute;left:50%;transform:translateX(-50%);bottom:6px;width:6px;height:6px;border-radius:50%;background:#8a7a55;transition:.3s;}
    #room.on .switch-led{background:#7CFF9B;box-shadow:0 0 8px #7CFF9B;}
    #room:not(.on) .light-switch{animation:swpulse 2.2s ease-in-out infinite;}
    @keyframes swpulse{0%,100%{box-shadow:0 5px 12px rgba(0,0,0,.45),0 0 10px 2px rgba(255,220,150,.25);}50%{box-shadow:0 5px 12px rgba(0,0,0,.45),0 0 24px 8px rgba(255,220,150,.55);}}
    .switch-hint{position:absolute;left:calc(var(--sw-l) + 60px);top:calc(var(--sw-t) + 18px);z-index:75;color:#ffe6b8;font-family:'DuaHandwriting',cursive;font-size:20px;transition:opacity .6s;pointer-events:none;text-shadow:0 2px 10px rgba(0,0,0,.6);}
    #room.on .switch-hint{opacity:0;}

    /* delicate steam wisps (the original style) */
    .steam{opacity:0;transform-box:fill-box;transform-origin:bottom center;animation:steam 3.6s ease-in-out infinite;}
    .steam.d1{animation-delay:1.2s;}.steam.d2{animation-delay:2.4s;}
    @keyframes steam{0%{opacity:0;transform:translateY(0) scaleX(1);}25%{opacity:.5;}60%{opacity:.35;}100%{opacity:0;transform:translateY(-56px) scaleX(1.5);}}
    #room:not(.on) .steam{animation-play-state:paused;}

    /* music notes */
    .music-note{position:absolute;font-size:24px;color:#ffd98a;pointer-events:none;animation:floatnote 1.9s ease-out forwards;text-shadow:0 2px 8px rgba(0,0,0,.5);z-index:76;}
    @keyframes floatnote{0%{opacity:0;transform:translate(0,0) rotate(-8deg) scale(.6);}20%{opacity:1;}100%{opacity:0;transform:translate(var(--dx),-100px) rotate(12deg) scale(1.1);}}

    .japan{position:absolute;left:var(--jp-l);top:var(--jp-t);width:var(--jp-w);height:var(--jp-h);background-repeat:no-repeat;background-position:center;background-size:contain;z-index:30;pointer-events:none;}
    #gramoHotspot{pointer-events:auto;cursor:pointer;}
    #room.on #gramoHotspot{cursor:pointer;}

    /* alignment grid (press G) */
    .grid{position:absolute;inset:0;z-index:90;pointer-events:none;display:none;
      background:
        repeating-linear-gradient(to right, rgba(0,200,255,.35) 0 1px, transparent 1px 10%),
        repeating-linear-gradient(to bottom, rgba(0,200,255,.35) 0 1px, transparent 1px 10%);}
    .grid.on{display:block;}
    .grid .gl{position:absolute;color:#7CFFEA;font-size:10px;font-weight:600;}
  </style>
</head>
<body>
<nav>
  <a class="nav-logo" href="index.html"><span class="l1">D</span><span class="l2">u</span><span class="l3">a</span><span class="l4">.</span><span class="l5">a</span><span class="l6">i</span></a>
  <a class="back-btn" href="index.html">← Home</a>
</nav>

<div id="room">
  <div class="stage" id="stage">
    <div class="bg"></div>
    <img class="illus" src="ourspace.png" alt="Our Space"/>

    <!-- overlays drawn in the illustration's own pixel coordinates (0..3840 x 0..2160) -->
    <svg class="overlay" viewBox="0 0 3840 2160" preserveAspectRatio="xMidYMid meet" xmlns="http://www.w3.org/2000/svg">
      <defs>
        <filter id="steamBlur" x="-60%" y="-60%" width="220%" height="220%"><feGaussianBlur stdDeviation="7"/></filter>
      </defs>

      <!-- FAIRY LIGHTS (bulbs generated by JS) -->
      <g id="fairyG"></g>

      <!-- STEAM over the two mugs (the original delicate wavy wisps) -->
      <g class="room-ui">
        <g class="steam"   ><path d="M2696 1330 q22 -26 0 -52 q-22 -26 0 -52" fill="none" stroke="#fff" stroke-width="8" stroke-linecap="round" opacity="0.7"/></g>
        <g class="steam d1"><path d="M2713 1330 q22 -26 0 -52 q-22 -26 0 -52" fill="none" stroke="#fff" stroke-width="8" stroke-linecap="round" opacity="0.6"/></g>
        <g class="steam d2"><path d="M2839 1330 q22 -26 0 -52 q-22 -26 0 -52" fill="none" stroke="#fff" stroke-width="8" stroke-linecap="round" opacity="0.7"/></g>
        <g class="steam d1"><path d="M2856 1330 q22 -26 0 -52 q-22 -26 0 -52" fill="none" stroke="#fff" stroke-width="8" stroke-linecap="round" opacity="0.6"/></g>
      </g>

      <!-- gramophone click target -->
      <rect id="gramoHotspot" x="700" y="1060" width="440" height="380" fill="transparent"/>
    </svg>

    <!-- warm glow + dark veil -->
    <div class="warm"></div>
    <div class="veil"></div>

    <!-- HTML UI -->
    <div class="player" id="player">
      <div class="phead"><b>🎶 our playlist</b><button class="pclose" id="pclose" aria-label="close">✕</button></div>
      <div id="spotifyEmbed"></div>
      <div class="note">our little playlist 💜</div>
    </div>

    <div class="switch-hint">flip the switch</div>
    <div class="light-switch" id="lightSwitch" title="Switch the lights"><div class="switch-knob"></div><div class="switch-led"></div></div>

    <div class="grid" id="grid"></div>
  </div>
</div>

<script>
  const room = document.getElementById('room');

  // ── fairy-light bulbs along the string you drew (points in image px) ──
  // tweak these points to sit them exactly on your string
  const FAIRY_POINTS = [[0,330],[470,210],[940,340],[1410,205],[1880,335],[2350,205],[2820,335],[3300,215],[3840,330]];
  (function(){
    const g=document.getElementById('fairyG'); const NS='http://www.w3.org/2000/svg';
    // gentle sagging wire through the points
    let d='M '+FAIRY_POINTS[0][0]+' '+FAIRY_POINTS[0][1];
    for(let i=1;i<FAIRY_POINTS.length;i++){
      const [x1,y1]=FAIRY_POINTS[i-1], [x2,y2]=FAIRY_POINTS[i];
      d+=' Q '+((x1+x2)/2)+' '+(Math.max(y1,y2)+42)+' '+x2+' '+y2;
    }
    const wire=document.createElementNS(NS,'path'); wire.setAttribute('d',d); wire.setAttribute('class','fairy-wire'); g.appendChild(wire);
    // tiny teardrop bulb (not fully round), centred at (x,y), scaled by s
    function drop(x,y,s){return 'M '+x+' '+(y-8*s)+' C '+(x+4.5*s)+' '+(y-8*s)+' '+(x+6.5*s)+' '+(y-2*s)+' '+(x+6.5*s)+' '+(y+3*s)+' C '+(x+6.5*s)+' '+(y+8.5*s)+' '+(x+3.5*s)+' '+(y+12*s)+' '+x+' '+(y+12*s)+' C '+(x-3.5*s)+' '+(y+12*s)+' '+(x-6.5*s)+' '+(y+8.5*s)+' '+(x-6.5*s)+' '+(y+3*s)+' C '+(x-6.5*s)+' '+(y-2*s)+' '+(x-4.5*s)+' '+(y-8*s)+' '+x+' '+(y-8*s)+' Z';}
    // sample bulbs along the actual curved wire so they sit on it
    const total=wire.getTotalLength(), STEP=165;
    for(let L=STEP*0.5; L<total; L+=STEP){
      const pt=wire.getPointAtLength(L);
      const stem=document.createElementNS(NS,'line');
      stem.setAttribute('x1',pt.x);stem.setAttribute('y1',pt.y);stem.setAttribute('x2',pt.x);stem.setAttribute('y2',pt.y+9);
      stem.setAttribute('stroke','#9a8a72');stem.setAttribute('stroke-width','2');stem.setAttribute('opacity','0.5');g.appendChild(stem);
      const s=0.8+Math.random()*0.4, by=pt.y+18;
      const b=document.createElementNS(NS,'path'); b.setAttribute('d',drop(pt.x,by,s)); b.setAttribute('class','fairy');
      b.style.animationDelay=(Math.random()*2.4).toFixed(2)+'s'; b.style.animationDuration=(1.8+Math.random()*1.6).toFixed(2)+'s';
      g.appendChild(b);
      const r=8*s, X=pt.x;
      const sp=document.createElementNS(NS,'path');
      sp.setAttribute('d','M '+X+' '+(by-r)+' L '+(X+r*0.26)+' '+(by-r*0.26)+' L '+(X+r)+' '+by+' L '+(X+r*0.26)+' '+(by+r*0.26)+' L '+X+' '+(by+r)+' L '+(X-r*0.26)+' '+(by+r*0.26)+' L '+(X-r)+' '+by+' L '+(X-r*0.26)+' '+(by-r*0.26)+' Z');
      sp.setAttribute('class','fairy-spark'); sp.style.animationDelay=(Math.random()*3).toFixed(2)+'s';
      g.appendChild(sp);
    }
  })();

  // ── lights ──
  function lightsOn(){ room.classList.add('on'); }
  document.getElementById('lightSwitch').addEventListener('click', ()=>room.classList.toggle('on'));

  // ── gramophone → open Spotify; notes float on their own only while music plays ──
  const PLAYLIST_ID='3zwdfvPr50nMfvgTI8DZmH';
  const player=document.getElementById('player');
  const gramo=document.getElementById('gramoHotspot'), stage=document.getElementById('stage');
  let playing=false;

  gramo.addEventListener('click', ()=>{ if(!room.classList.contains('on')) lightsOn(); player.classList.add('show'); });
  document.getElementById('pclose').addEventListener('click', ()=>player.classList.remove('show'));

  // Spotify iFrame API tells us when the track is actually playing/paused
  window.onSpotifyIframeApiReady = (API)=>{
    API.createController(document.getElementById('spotifyEmbed'),
      { uri:'spotify:playlist:'+PLAYLIST_ID, width:'100%', height:152 },
      (ctrl)=>{ ctrl.addListener('playback_update', e=>{ playing = !e.data.isPaused; }); });
  };

  // drift a single note out of the instrument
  const glyphs=['♪','♫','♬','🎵'];
  function spawnNote(){
    const r=gramo.getBoundingClientRect(), sr=stage.getBoundingClientRect();
    if(!r.width) return;
    const n=document.createElement('div'); n.className='music-note'; n.textContent=glyphs[Math.floor(Math.random()*glyphs.length)];
    n.style.left=(r.left-sr.left + r.width*0.35 + Math.random()*r.width*0.4)+'px';
    n.style.top =(r.top -sr.top  + Math.random()*20)+'px';
    n.style.setProperty('--dx',(Math.random()*90-30)+'px');
    stage.appendChild(n); setTimeout(()=>n.remove(),2100);
  }
  setInterval(()=>{ if(playing && room.classList.contains('on')) spawnNote(); }, 720);

  // ── alignment grid (press G) — shows 10% lines + labels to help positioning ──
  (function(){
    const grid=document.getElementById('grid');
    for(let p=0;p<=100;p+=10){
      const gx=document.createElement('div'); gx.className='gl'; gx.textContent=p+'%'; gx.style.left=p+'%'; gx.style.top='2px'; grid.appendChild(gx);
      const gy=document.createElement('div'); gy.className='gl'; gy.textContent=p+'%'; gy.style.top=p+'%'; gy.style.left='2px'; grid.appendChild(gy);
    }
    addEventListener('keydown', e=>{ if(e.key==='g'||e.key==='G') grid.classList.toggle('on'); });
  })();
</script>
<script src="https://open.spotify.com/embed/iframe-api/v1" async></script>
</body>
</html>
